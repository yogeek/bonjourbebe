<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonjour Bébé | Infant Massage Bellevue & Seattle</title>
    <meta name="description" content="Bonjour Bébé offers certified infant massage classes in Bellevue and Greater Seattle. Private sessions, group workshops, and prenatal consultations. Sessions in English and French." />
    <meta name="keywords" content="infant massage, baby massage, Bellevue, Seattle, IAIM, certified educator, parent-baby bonding, prenatal" />
    <meta property="og:title" content="Bonjour Bébé | Infant Massage Bellevue & Seattle" />
    <meta property="og:description" content="Certified infant massage classes for Bellevue and Greater Seattle families. Nurturing touch, French calm, deep connection." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://yogeek.github.io/bonjourbebe/marion-pro.jpg" />
    <link rel="icon" type="image/svg+xml" href="/bonjourbebe/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              blush: '#F7DCDC',
              cream: '#FFF8F3',
              sage: '#DDE9E4',
              pacific: '#6CA4BC',
              taupe: '#5A4A42',
              charcoal: '#363636',
            },
            fontFamily: {
              sans: ['Lato', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              script: ['Dancing Script', 'cursive'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-up': 'slideUp 0.8s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for a softer feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #FFF8F3;
      }
      ::-webkit-scrollbar-thumb {
        background: #DDE9E4;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6CA4BC;
      }
    </style>
</head>
  <body class="bg-cream text-taupe antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
